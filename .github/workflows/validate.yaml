name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    # Validates that the integration is structurally correct for Home Assistant
    # (manifest, strings, translations).
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    # Validates the repo is installable via HACS. `brands` and `topics` are
    # default-store publishing requirements (brand assets in home-assistant/brands
    # and GitHub repo topics), not needed for a custom-repository install, so they
    # are ignored. Requires a public repository — HACS reads hacs.json /
    # manifest.json through the GitHub API.
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands topics
