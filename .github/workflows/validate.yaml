name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    # Validates that the integration is structurally correct for Home Assistant
    # (manifest, strings, translations). This is the check that matters for a
    # custom-repo / manually-installed integration.
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    # HACS validation is primarily a *default-store submission* linter. This is a
    # personal custom-repository integration, so the store-only checks are
    # ignored: `brands` needs assets in the home-assistant/brands repo, and
    # `topics` needs GitHub repo topics — neither is required to install from a
    # custom repository.
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands topics
