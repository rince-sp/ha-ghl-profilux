name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    # Validates that the integration is structurally correct for Home Assistant
    # (manifest, strings, translations). This is the meaningful check for a
    # custom-repo / manually-installed integration.
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # NOTE: The HACS validation action (hacs/action) is a *default-store publishing*
  # linter. It requires a PUBLIC repository (it fetches hacs.json / manifest.json
  # through the GitHub API), plus brand assets in the home-assistant/brands repo
  # and GitHub repo topics — none of which are needed to install this integration
  # manually or as a HACS custom repository. It is intentionally omitted here.
  # To publish to the HACS default store later, make the repo public and add a
  # job:  uses: hacs/action@main  with: { category: integration }
