# ProfiLux aquarium dashboard (Lovelace, "sections" view).
#
# Sensor gauges + power-socket outlet tiles + level/alarm row.
#
# Entity IDs below match a ProfiLux whose sockets are named as on this install;
# adjust the `entity:` values to your own socket/sensor entity IDs if they differ
# (Settings -> Devices & Services -> Entities, filter "profilux").
#
# How to use — pick one:
#   A) Quick: Settings -> Dashboards -> Add dashboard -> New dashboard -> take
#      control -> ... -> Raw configuration editor -> paste everything below.
#   B) YAML mode: drop this file in /config and reference it from
#      configuration.yaml:
#        lovelace:
#          dashboards:
#            profilux-aquarium:
#              mode: yaml
#              title: Aquarium
#              icon: mdi:fishbowl
#              filename: ha-ghl-profilux/dashboards/aquarium.yaml

title: Aquarium
views:
  - title: Aquarium
    path: aquarium
    type: sections
    icon: mdi:fishbowl
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sensoren
            icon: mdi:gauge
          - type: gauge
            entity: sensor.profilux_temperatur
            name: Temperatur
            unit: "°C"
            min: 18
            max: 32
            needle: true
            severity: { green: 24, yellow: 27, red: 29 }
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_ph
            name: pH
            min: 6
            max: 9
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_redox
            name: Redox
            unit: mV
            min: 0
            max: 500
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_leitwert
            name: Leitwert
            unit: mS/cm
            min: 0
            max: 60
            needle: true
            severity: { green: 45, yellow: 56, red: 58 }
            grid_options: { columns: 6 }

      - type: grid
        cards:
          - type: heading
            heading: Schaltkanäle
            icon: mdi:power-socket-de
          - { type: tile, entity: binary_sensor.profilux_zeovit_reaktor, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_ozon_sander, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_ozon_luft, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_pumpe_uv, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_5, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_6, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_d_d_kh_manager, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_8, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_kalkruhrer, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_mediareaktor, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_dosierer_balling, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_helix_skim_clean, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_magnetventil, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_ato_pumpe, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_osmose_anlage, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_uv_lamp, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_orphek_or4, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_virtuelller_scha, icon: mdi:power-socket-de, grid_options: { columns: 4 } }

      - type: grid
        cards:
          - type: heading
            heading: Niveau & Alarm
            icon: mdi:water-percent
          - { type: tile, entity: binary_sensor.profilux_nachfullbecken_alarm, name: Nachfüllbecken, grid_options: { columns: 6 } }
          - { type: tile, entity: binary_sensor.profilux_technikbecken_alarm, name: Technikbecken, grid_options: { columns: 6 } }
          - { type: tile, entity: binary_sensor.profilux_level_3_alarm, name: Regelkreis 3, grid_options: { columns: 6 } }
          - { type: tile, entity: binary_sensor.profilux_alarm, name: Controller Alarm, grid_options: { columns: 6 } }
