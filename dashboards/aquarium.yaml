# ProfiLux aquarium dashboard (Lovelace, "sections" view).
#
# Layout (two columns wide):
#   1. Controller alarm            — full width, at the very top
#   2. Sensors (left) | Power (right)
#   3. Switching channels          — socket cards
#   4. Level control loops         — loop cards
#   5. Dosing pumps                — reservoir fill level
#
# The `entity:` IDs below are placeholders — replace them with your own
# socket/sensor entity IDs (Settings -> Devices & Services -> Entities, filter
# "profilux"), or use the auto-generating strategy dashboard, which needs none.
#
# How to use — pick one:
#   A) Quick: Settings -> Dashboards -> Add dashboard -> New dashboard -> take
#      control -> ... -> Raw configuration editor -> paste everything below.
#   B) YAML mode: drop this file in /config and reference it from
#      configuration.yaml:
#        lovelace:
#          dashboards:
#            profilux-aquarium:
#              mode: yaml
#              title: Aquarium
#              icon: mdi:fishbowl
#              filename: ha-ghl-profilux/dashboards/aquarium.yaml

title: Aquarium
views:
  - title: Aquarium
    path: aquarium
    type: sections
    icon: mdi:fishbowl
    max_columns: 2
    sections:
      # 1. Controller alarm — full width, at the very top.
      - type: grid
        column_span: 2
        cards:
          - type: tile
            entity: binary_sensor.profilux_alarm
            name: Controller Alarm
            icon: mdi:alert
            grid_options: { columns: full }

      # 2a. Sensors (left column).
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Sensoren
            icon: mdi:gauge
          - type: gauge
            entity: sensor.profilux_temperatur
            name: Temperatur
            unit: "°C"
            min: 18
            max: 32
            needle: true
            severity: { green: 24, yellow: 27, red: 29 }
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_ph
            name: pH
            min: 6
            max: 9
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_redox
            name: Redox
            unit: mV
            min: 0
            max: 500
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_leitwert
            name: Leitwert
            unit: mS/cm
            min: 0
            max: 60
            needle: true
            severity: { green: 45, yellow: 56, red: 58 }
            grid_options: { columns: 6 }

      # 2b. Power & current (right column).
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Stromverbrauch
            icon: mdi:flash
          - { type: tile, entity: sensor.profilux_total_power, color: orange, icon: mdi:flash, grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_total_current, color: orange, icon: mdi:current-ac, grid_options: { columns: 6 } }
          - type: history-graph
            hours_to_show: 24
            entities: [{ entity: sensor.profilux_total_power }]
            grid_options: { columns: full, rows: 4 }

      # 3. Switching channels — socket cards (name + state colour + power).
      # Prefer the switch.* entity when socket control is enabled; otherwise use
      # the binary_sensor.* status entity. Replace with your own entity IDs.
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Schaltkanäle
            icon: mdi:power-socket-de
          - { type: tile, entity: switch.profilux_socket_1, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }
          - { type: tile, entity: switch.profilux_socket_2, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }
          - { type: tile, entity: switch.profilux_socket_3, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }
          - { type: tile, entity: switch.profilux_socket_4, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }
          - { type: tile, entity: switch.profilux_socket_5, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }
          - { type: tile, entity: switch.profilux_socket_6, icon: mdi:power-socket-de, color: amber, state_content: [state, power_w], grid_options: { columns: 4 } }

      # 4. Level control loops — one card per loop, coloured by its alarm state
      # (red = fault, e.g. a dry float; neutral = OK). Tapping the card lists the
      # sensors assigned to the loop.
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Niveau-Regelkreise
            icon: mdi:water-percent
          - { type: tile, entity: binary_sensor.profilux_level_1_alarm, name: Level 1, icon: mdi:waves, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_level_2_alarm, name: Level 2, icon: mdi:waves, grid_options: { columns: 4 } }

      # 5. Dosing pumps — reservoir fill level.
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Dosierpumpen
            icon: mdi:cup-water
          - { type: tile, entity: sensor.profilux_dosing_pump_1_fill_level, color: light-blue, icon: mdi:cup-water, state_content: [state, percent], grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_2_fill_level, color: light-blue, icon: mdi:cup-water, state_content: [state, percent], grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_3_fill_level, color: light-blue, icon: mdi:cup-water, state_content: [state, percent], grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_4_fill_level, color: light-blue, icon: mdi:cup-water, state_content: [state, percent], grid_options: { columns: 6 } }
