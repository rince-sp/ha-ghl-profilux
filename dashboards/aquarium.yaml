# ProfiLux aquarium dashboard (Lovelace, "sections" view).
#
# Sensor gauges, power-socket tiles, power/current, dosing-pump fill levels,
# and a level (status + float switches) / alarm row.
#
# The `entity:` IDs below are placeholders — replace them with your own
# socket/sensor entity IDs (Settings -> Devices & Services -> Entities, filter
# "profilux"), or use the auto-generating strategy dashboard, which needs none.
#
# How to use — pick one:
#   A) Quick: Settings -> Dashboards -> Add dashboard -> New dashboard -> take
#      control -> ... -> Raw configuration editor -> paste everything below.
#   B) YAML mode: drop this file in /config and reference it from
#      configuration.yaml:
#        lovelace:
#          dashboards:
#            profilux-aquarium:
#              mode: yaml
#              title: Aquarium
#              icon: mdi:fishbowl
#              filename: ha-ghl-profilux/dashboards/aquarium.yaml

title: Aquarium
views:
  - title: Aquarium
    path: aquarium
    type: sections
    icon: mdi:fishbowl
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sensoren
            icon: mdi:gauge
          - type: gauge
            entity: sensor.profilux_temperatur
            name: Temperatur
            unit: "°C"
            min: 18
            max: 32
            needle: true
            severity: { green: 24, yellow: 27, red: 29 }
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_ph
            name: pH
            min: 6
            max: 9
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_redox
            name: Redox
            unit: mV
            min: 0
            max: 500
            needle: true
            grid_options: { columns: 6 }
          - type: gauge
            entity: sensor.profilux_leitwert
            name: Leitwert
            unit: mS/cm
            min: 0
            max: 60
            needle: true
            severity: { green: 45, yellow: 56, red: 58 }
            grid_options: { columns: 6 }

      - type: grid
        cards:
          - type: heading
            heading: Schaltkanäle
            icon: mdi:power-socket-de
          # Placeholder entity IDs — replace with your own socket entity IDs
          # (Settings -> Devices & Services -> Entities, filter "profilux"), or
          # just use the auto-generating strategy dashboard instead.
          - { type: tile, entity: binary_sensor.profilux_socket_1, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_2, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_3, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_4, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_5, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_6, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_7, icon: mdi:power-socket-de, grid_options: { columns: 4 } }
          - { type: tile, entity: binary_sensor.profilux_socket_8, icon: mdi:power-socket-de, grid_options: { columns: 4 } }

      - type: grid
        cards:
          - type: heading
            heading: Leistung & Stromaufnahme
            icon: mdi:flash
          - type: history-graph
            hours_to_show: 24
            entities: [{ entity: sensor.profilux_total_power }]
            grid_options: { columns: full, rows: 4 }
          - { type: tile, entity: sensor.profilux_total_current, grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_total_power, grid_options: { columns: 6 } }
          # Per-socket current — replace with your own *_current entity IDs.
          - { type: tile, entity: sensor.profilux_socket_1_current, grid_options: { columns: 4 } }
          - { type: tile, entity: sensor.profilux_socket_2_current, grid_options: { columns: 4 } }
          - { type: tile, entity: sensor.profilux_socket_3_current, grid_options: { columns: 4 } }

      - type: grid
        cards:
          - type: heading
            heading: Dosierpumpen
            icon: mdi:cup-water
          # Fill level per in-use dosing pump — replace with your own
          # *_fill_level entity IDs.
          - { type: tile, entity: sensor.profilux_dosing_pump_1_fill_level, grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_2_fill_level, grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_3_fill_level, grid_options: { columns: 6 } }
          - { type: tile, entity: sensor.profilux_dosing_pump_4_fill_level, grid_options: { columns: 6 } }

      - type: grid
        cards:
          - type: heading
            heading: Niveau & Alarm
            icon: mdi:water-percent
          # Per loop: overall status, its min/max float switches, and its alarm.
          - { type: tile, entity: sensor.profilux_level_1_status, name: Level 1, grid_options: { columns: 6 } }
          - { type: tile, entity: binary_sensor.profilux_level_1_min_float, grid_options: { columns: 3 } }
          - { type: tile, entity: binary_sensor.profilux_level_1_max_float, grid_options: { columns: 3 } }
          - { type: tile, entity: sensor.profilux_level_2_status, name: Level 2, grid_options: { columns: 6 } }
          - { type: tile, entity: binary_sensor.profilux_level_2_min_float, grid_options: { columns: 3 } }
          - { type: tile, entity: binary_sensor.profilux_level_2_max_float, grid_options: { columns: 3 } }
          - { type: tile, entity: binary_sensor.profilux_alarm, name: Controller Alarm, grid_options: { columns: 6 } }
